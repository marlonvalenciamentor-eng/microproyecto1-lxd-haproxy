global
    log         /dev/log local0
    maxconn     50000
    user        haproxy
    group       haproxy
    daemon

defaults
    log         global
    mode        http
    option      httplog
    option      dontlognull
    option      redispatch
    retries     3
    timeout     connect  5s
    timeout     client   30s
    timeout     server   30s

# ── Stats GUI ─────────────────────────────────────────────────────────────
listen stats
    bind        *:8404
    stats       enable
    stats       uri     /stats
    stats       realm   HAProxy\ Statistics
    stats       auth    admin:admin123
    stats       refresh 5s
    stats       show-legends
    stats       show-node
    stats       admin   if TRUE

# ── Frontend ──────────────────────────────────────────────────────────────
frontend http_front
    bind        *:80
    default_backend web_servers

# ── Backend ───────────────────────────────────────────────────────────────
backend web_servers
    balance     roundrobin
    option      httpchk GET /
    option      allbackups

    # Produccion: max 20 conexiones concurrentes cada uno
    # Al llenarse la cola, entran los servidores de backup
    server web1  192.168.100.3:8081 check maxconn 20
    server web2  192.168.100.2:8082 check maxconn 20

    # Backup: activan cuando produccion esta caida O sobrecargada
    server web3  192.168.100.3:8083 check backup
    server web4  192.168.100.2:8084 check backup

    # Pagina personalizada cuando TODOS los servidores estan caidos
    errorfile 503 /etc/haproxy/errors/503.http
